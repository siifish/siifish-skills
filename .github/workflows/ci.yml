name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
      - run: npm run check
      - name: Verify skills CLI discovery
        env:
          DISABLE_TELEMETRY: "1"
        run: npx --yes skills@1.5.20 add . --list
